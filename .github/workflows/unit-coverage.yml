---
# Unit test coverage workflow for purestorage.flasharray
# Runs ansible-test units with coverage instrumentation and publishes
# a Cobertura XML summary via CodeCoverageSummary.
#
# This is intentionally separate from the certification sanity workflow.
# Sanity coverage only reflects import-time line touches; this workflow
# exercises actual module logic through the unit test suite.
#
# Prerequisites:
#   - tests/unit/requirements.txt must list any pip deps your modules import
#     (e.g. pypureclient, requests) so ansible-test can install them inside
#     the test container.
#   - If you need to add a requirements file, create:
#       tests/unit/requirements.txt
#     with one package per line.

name: Unit Test Coverage

permissions:
  contents: read

on:
  pull_request:
    branches: [main]
  workflow_dispatch:
  schedule:
    # Run nightly at 07:00 UTC (offset from the cert workflow at 06:00)
    - cron: '0 7 * * *'

concurrency:
  group: unit-coverage-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  unit-coverage:
    name: Unit Tests & Coverage
    runs-on: ubuntu-latest

    steps:
      # ansible-test requires the collection to live under the canonical
      # ansible_collections/<namespace>/<name> path relative to the CWD.
      # Checking out directly to that path is the simplest way to achieve this.
      - name: Check out collection
        uses: actions/checkout@v4
        with:
          path: ansible_collections/purestorage/flasharray
          persist-credentials: false

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Install the same ansible-core branch used by the certification workflow.
      # Pin to stable-2.16 to keep results comparable.
      - name: Install ansible-core stable-2.16
        run: |
          python -m pip install \
            https://github.com/ansible/ansible/archive/stable-2.16.tar.gz \
            --disable-pip-version-check \
            --user

      # Run unit tests inside the default ansible-test Docker container.
      # --coverage instruments all executed Python for later report generation.
      # --python 3.12 matches the controller Python installed above.
      - name: Run unit tests with coverage
        working-directory: ansible_collections/purestorage/flasharray
        run: |
          ~/.local/bin/ansible-test units \
            -v \
            --color \
            --coverage \
            --docker default \
            --python 3.11

      # Convert the raw .coverage data files into a single Cobertura XML report.
      # --group-by command produces coverage=units.xml (not coverage=sanity.xml).
      - name: Generate coverage XML report
        working-directory: ansible_collections/purestorage/flasharray
        run: |
          ~/.local/bin/ansible-test coverage xml \
            -v \
            --requirements \
            --group-by command

      # Verify the expected report file was actually produced before trying
      # to parse it. ansible-test will skip coverage generation if no data
      # was collected (e.g. all tests were skipped).
      - name: Check coverage report exists
        id: check-report
        run: |
          REPORT="ansible_collections/purestorage/flasharray/tests/output/reports/coverage=units.xml"
          if [ -f "${REPORT}" ]; then
            echo "present=true" >> "${GITHUB_OUTPUT}"
            echo "path=${REPORT}" >> "${GITHUB_OUTPUT}"
          else
            echo "present=false" >> "${GITHUB_OUTPUT}"
            echo "::warning::Coverage report not found. Were any unit tests collected?"
          fi

      # Parse the Cobertura XML and write a markdown table to the job summary
      # and (on PRs) as a PR comment.
      # Thresholds: warn below 50%, fail badge below 75%.
      # fail_below_min is false so the step never hard-fails the workflow --
      # coverage regressions are surfaced as a visible badge, not a broken build.
      - name: Code coverage summary
        if: steps.check-report.outputs.present == 'true'
        uses: irongut/CodeCoverageSummary@v1.3.0
        with:
          filename: ${{ steps.check-report.outputs.path }}
          badge: true
          format: markdown
          output: both
          indicators: true
          hide_branch_rate: false
          hide_complexity: false
          fail_below_min: false
          thresholds: '50 75'

      - name: Write coverage summary to job
        if: steps.check-report.outputs.present == 'true'
        run: cat code-coverage-results.md >> "${GITHUB_STEP_SUMMARY}"

      # Upload the raw XML as a workflow artifact so it can be downloaded
      # for local inspection or consumed by other tools (e.g. Codecov).
      - name: Upload coverage XML artifact
        if: steps.check-report.outputs.present == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: unit-coverage-report
          path: ansible_collections/purestorage/flasharray/tests/output/reports/coverage=units.xml
          retention-days: 30
